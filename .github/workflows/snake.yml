name: generate snake animation

on:
  # run twice a day so the snake stays fresh
  schedule:
    - cron: "0 */12 * * *"
  # allow manual runs from the Actions tab
  workflow_dispatch:
  # regenerate on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate the snake svg files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-blue-dark.svg?palette=github-dark&color_snake=#3B82F6&color_dots=#161b22,#0e2a47,#15489c,#2f6fdb,#58a6ff
            dist/github-snake.svg?color_snake=#3B82F6&color_dots=#ebedf0,#bcd4ff,#7fb0ff,#3B82F6,#1e60a8

      - name: push the snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
